<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Goddies</title>
    <link rel="stylesheet" href="style10.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <section id="header">
        <a href="index.html" class="logo">Goddies</a>
        <div>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#product1">Products</a></li>
                <li><a href="index.html#banner">Offers</a></li>
                <li><a href="index.html#footer">Contact</a></li>
            </ul>
        </div>
        <div id="mobile">
            <a href="cart.html" style="position:relative;">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" style="
                    position:absolute; top:-8px; right:-10px;
                    background:#ec544e; color:#fff; font-size:11px;
                    border-radius:50%; width:18px; height:18px;
                    display:flex; align-items:center; justify-content:center;
                ">0</span>
            </a>
            <i id="bar" class="fas fa-outdent"></i>
        </div>
    </section>

    <section id="page-header">
        <h2>#YourCart</h2>
        <p>Home &gt; Cart</p>
    </section>

    <section id="cart" class="section-p1">
        <table>
            <thead>
                <tr>
                    <td>Remove</td>
                    <td>Image</td>
                    <td>Product</td>
                    <td>Price</td>
                    <td>Quantity</td>
                    <td>Subtotal</td>
                </tr>
            </thead>
            <tbody id="cart-body"></tbody>
        </table>
    </section>

    <section id="cart-add" class="section-p1">
        <div id="coupon">
            <h3>Apply Coupon</h3>
            <div>
                <input type="text" placeholder="Enter Code">
                <button class="normal">Apply</button>
            </div>
        </div>
        <div id="subtotal">
            <h3>Cart Totals</h3>
            <table>
                <tr>
                    <td>Subtotal</td>
                    <td id="cart-subtotal">$0.00</td>
                </tr>
                <tr>
                    <td>Total</td>
                    <td id="cart-total">$0.00</td>
                </tr>
            </table>
            <button class="normal">Proceed to checkout</button>
        </div>
    </section>

    <footer id="footer" class="section-p1">
        <div class="col">
            <h2>Goddiess</h2>
        </div>
        <div class="copyright">
            <p>©2026 Goddies. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script src="spark.js"></script>
</body>

</html>
